services:
  mysql:
    image: mysql:8.0
    container_name: campus-snack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: campus_snack
    ports:
      - "3306:3306"
    volumes:
      - ./database/mysql_init.sql:/docker-entrypoint-initdb.d/init.sql
      - campus_snack_mysql_data:/var/lib/mysql

  server:
    build:
      context: ./server
    container_name: campus-snack-server
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PORT: 3000
      DB_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123456
      DB_NAME: campus_snack
    ports:
      - "3000:3000"

volumes:
  campus_snack_mysql_data:
